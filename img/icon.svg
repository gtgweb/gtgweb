<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- gtgWeb v2 : le clipboard GTG (silhouette d'origine) modernise.
       Fond degrade bleu GNOME. Coches vertes #2ec27e (signature GTG).
       Clin d'oeil : la 2e tache est un HYPERLIEN (bleu souligne) = le cap wiki. -->
  <defs>
    <linearGradient id="fond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62a0ea"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#fond)"/>

  <!-- ombre portee douce (nette, style GNOME flat) -->
  <rect x="136" y="140" width="240" height="280" rx="28" fill="#000000" opacity="0.16"/>

  <!-- feuille du clipboard -->
  <rect x="136" y="126" width="240" height="280" rx="28" fill="#ffffff"/>

  <!-- pince (gris GTG, deux tons) -->
  <rect x="212" y="118" width="88" height="34" rx="12" fill="#9a9996"/>
  <rect x="208" y="102" width="96" height="36" rx="13" fill="#c0bfbc"/>

  <!-- rangee 1 : faite -->
  <rect x="164" y="176" width="44" height="44" rx="11" fill="#2ec27e"/>
  <path d="M 175 198 L 184 208 L 197 186" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="224" y="188" width="122" height="18" rx="9" fill="#deddda"/>

  <!-- rangee 2 : faite, et c'est un LIEN (clin d'oeil wiki) -->
  <rect x="164" y="248" width="44" height="44" rx="11" fill="#2ec27e"/>
  <path d="M 175 270 L 184 280 L 197 258" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="224" y="260" width="98" height="18" rx="9" fill="#3584e4"/>
  <rect x="224" y="284" width="98" height="6" rx="3" fill="#3584e4"/>

  <!-- rangee 3 : a faire (case vide) -->
  <rect x="167" y="323" width="38" height="38" rx="10" fill="none" stroke="#c0bfbc" stroke-width="7"/>
  <rect x="224" y="332" width="122" height="18" rx="9" fill="#deddda"/>
</svg>
